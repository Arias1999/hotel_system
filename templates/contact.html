<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – HotelBook</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .contact-hero {
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                        url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=1400') center/cover no-repeat;
            min-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
        }
        .contact-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            color: #c9a84c;
            text-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }
        .contact-body { max-width: 1000px; margin: 52px auto; padding: 0 24px; }
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 48px;
        }
        .contact-card {
            background: #252538;
            border-radius: 14px;
            padding: 32px 20px;
            text-align: center;
            border: 1px solid #35354a;
        }
        .contact-icon { font-size: 36px; margin-bottom: 14px; }
        .contact-label { font-size: 12px; color: #7a6a5a; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .contact-value { color: #e8e0d0; font-size: 15px; font-weight: 500; }
        .contact-form-wrap {
            background: #252538;
            border-radius: 16px;
            padding: 40px;
            border: 1px solid #35354a;
        }
        .contact-form-wrap h2 { margin-bottom: 24px; }
        .contact-form-wrap input,
        .contact-form-wrap textarea {
            display: block;
            width: 100%;
            padding: 11px 14px;
            margin-bottom: 16px;
            border: 1px solid #3e3e52;
            border-radius: 8px;
            font-size: 14px;
            background: #1e1e2e;
            color: #e8e0d0;
            font-family: 'Poppins', sans-serif;
        }
        .contact-form-wrap input::placeholder,
        .contact-form-wrap textarea::placeholder { color: #6a6a80; }
        .contact-form-wrap input:focus,
        .contact-form-wrap textarea:focus { outline: none; border-color: #c9a84c; }
        .contact-form-wrap textarea { height: 140px; resize: vertical; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">🏨 HotelBook</span>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        </div>
    </nav>

    <div class="contact-hero">
        <h1>Contact Us</h1>
    </div>

    <div class="contact-body">
        <div class="contact-grid">
            <div class="contact-card">
                <div class="contact-icon">📍</div>
                <div class="contact-label">Address</div>
                <div class="contact-value">123 Luxury Ave, Cebu City, Philippines</div>
            </div>
            <div class="contact-card">
                <div class="contact-icon">📞</div>
                <div class="contact-label">Phone</div>
                <div class="contact-value">+63 912 345 6789</div>
            </div>
            <div class="contact-card">
                <div class="contact-icon">✉️</div>
                <div class="contact-label">Email</div>
                <div class="contact-value">hello@hotelbook.ph</div>
            </div>
        </div>

        <div class="contact-form-wrap">
            <h2>Send Us a Message</h2>
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="text" placeholder="Subject">
                <textarea placeholder="Your message..."></textarea>
                <button class="btn" type="submit">Send Message</button>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2025 HotelBook. All rights reserved.</p>
        <div class="footer-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </div>
    </footer>
</body>
</html>
